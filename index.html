<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HLS Stream Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8ff47;
    --accent2: #b8ff00;
    --text: #f0f0ee;
    --muted: #666660;
    --muted2: #999994;
    --red: #ff4d4d;
    --green: #4dff91;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
    --radius-lg: 12px;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
  }

  body {
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(232,255,71,0.06) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px; background: var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 99px;
    background: rgba(232,255,71,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.2);
  }

  /* URL bar */
  .url-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .url-input::placeholder { color: var(--muted); }
  .url-input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #0a0a0b;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; pointer-events: none; }

  /* Player */
  .player-shell {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
  }

  video {
    width: 100%; height: 100%;
    display: block;
    background: #000;
  }

  .placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: #000;
    pointer-events: none;
  }
  .placeholder.hidden { display: none; }
  .ph-ring {
    width: 64px; height: 64px;
    border: 2px solid #222;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .ph-triangle {
    width: 0; height: 0;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-left: 20px solid #333;
    margin-left: 5px;
  }
  .ph-text { font-size: 13px; color: #444; font-family: var(--mono); }

  /* Controls panel */
  .controls {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .ctrl-group {
    display: flex; align-items: center; gap: 8px;
  }
  .ctrl-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .ctrl-select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: var(--radius);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .ctrl-select:focus { border-color: var(--accent); }

  .ctrl-divider {
    width: 1px; height: 24px;
    background: var(--border2);
    flex-shrink: 0;
  }

  /* Info bar */
  .info-bar {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    flex-wrap: wrap;
    gap: 0;
  }
  .info-cell {
    flex: 1;
    min-width: 100px;
    padding: 4px 14px 4px 0;
  }
  .info-cell + .info-cell {
    padding-left: 14px;
    border-left: 1px solid var(--border);
  }
  .info-cell-label {
    font-size: 10px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .info-cell-val {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text);
    font-weight: 700;
  }

  /* Status bar */
  .status-bar {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted2);
    min-height: 36px;
    background: var(--surface);
  }
  .status-pip {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-pip.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-pip.err { background: var(--red); }
  .status-pip.loading {
    background: var(--accent);
    animation: pulse 0.9s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Live indicator */
  .live-pill {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 99px;
    background: rgba(77,255,145,0.12);
    color: var(--green);
    border: 1px solid rgba(77,255,145,0.22);
    display: none;
    align-items: center;
    gap: 5px;
    margin-left: auto;
  }
  .live-pill.show { display: flex; }
  .live-pip {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1s infinite;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .header { flex-wrap: wrap; gap: 10px; }
    .controls { gap: 8px; }
    .info-bar { flex-direction: column; gap: 6px; }
    .info-cell + .info-cell { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 6px; }
    .url-bar { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="4,2 16,9 4,16" fill="#0a0a0b"/>
        </svg>
      </div>
      <span class="logo-name">HLS Player</span>
    </div>
    <span class="badge">Referer-Ready</span>
  </header>

  <div class="url-bar">
    <input class="url-input" id="url-input" type="text"
      placeholder="Paste .m3u8 HLS stream URL…" spellcheck="false" autocomplete="off" />
    <button class="btn" id="play-btn" onclick="loadStream()">▶ Play</button>
  </div>

  <div class="player-shell">
    <div class="video-wrap">
      <video id="video" controls playsinline crossorigin="anonymous"></video>
      <div class="placeholder" id="placeholder">
        <div class="ph-ring"><div class="ph-triangle"></div></div>
        <span class="ph-text">Waiting for stream URL</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-group">
        <span class="ctrl-label">Quality</span>
        <select class="ctrl-select" id="quality-select" onchange="changeQuality(this.value)">
          <option value="-1">Auto (ABR)</option>
        </select>
      </div>

      <div class="ctrl-divider"></div>

      <div class="ctrl-group">
        <span class="ctrl-label">Speed</span>
        <select class="ctrl-select" id="speed-select" onchange="changeSpeed(this.value)">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="1.75">1.75×</option>
          <option value="2">2×</option>
          <option value="3">3×</option>
        </select>
      </div>

      <div class="live-pill" id="live-pill">
        <div class="live-pip"></div>
        Live
      </div>
    </div>

    <!-- Info bar -->
    <div class="info-bar">
      <div class="info-cell">
        <div class="info-cell-label">Referer</div>
        <div class="info-cell-val">patreon.com</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Domain</div>
        <div class="info-cell-val">mux.com</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Resolution</div>
        <div class="info-cell-val" id="info-res">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Bitrate</div>
        <div class="info-cell-val" id="info-bitrate">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Dropped Frames</div>
        <div class="info-cell-val" id="info-dropped">—</div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-pip" id="status-pip"></div>
      <span id="status-msg">Ready — paste a stream URL and press Play</span>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
  var hls = null;
  var video = document.getElementById('video');
  var placeholder = document.getElementById('placeholder');
  var statusMsg = document.getElementById('status-msg');
  var statusPip = document.getElementById('status-pip');
  var livePill = document.getElementById('live-pill');
  var infoRes = document.getElementById('info-res');
  var infoBitrate = document.getElementById('info-bitrate');
  var infoDropped = document.getElementById('info-dropped');
  var qualitySelect = document.getElementById('quality-select');
  var playBtn = document.getElementById('play-btn');
  var droppedTimer = null;

  function setStatus(msg, type) {
    statusMsg.textContent = msg;
    statusPip.className = 'status-pip' + (type ? ' ' + type : '');
  }

  function changeQuality(val) {
    if (!hls) return;
    var lvl = parseInt(val);
    hls.currentLevel = lvl;
    hls.nextLevel = lvl;
    if (lvl === -1) {
      hls.loadLevel = -1;
      setStatus('Quality: Auto (ABR active)', 'ok');
    } else {
      var l = hls.levels[lvl];
      setStatus('Quality locked: ' + (l ? l.height + 'p' : lvl), 'ok');
    }
  }

  function changeSpeed(val) {
    video.playbackRate = parseFloat(val);
  }

  function populateQualities(levels) {
    qualitySelect.innerHTML = '<option value="-1">Auto (ABR)</option>';
    levels.forEach(function(lvl, i) {
      var label = '';
      if (lvl.height) label = lvl.height + 'p';
      else if (lvl.width) label = lvl.width + 'w';
      else label = 'Level ' + i;
      if (lvl.bitrate) label += ' — ' + Math.round(lvl.bitrate / 1000) + ' kbps';
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = label;
      qualitySelect.appendChild(opt);
    });
  }

  function updateDropped() {
    if (video.getVideoPlaybackQuality) {
      var q = video.getVideoPlaybackQuality();
      infoDropped.textContent = q.droppedVideoFrames + ' / ' + q.totalVideoFrames;
    }
  }

  function loadStream() {
    var url = document.getElementById('url-input').value.trim();
    if (!url) { setStatus('Please enter a stream URL.', 'err'); return; }
    if (!/^https?:\/\//i.test(url)) { setStatus('URL must start with http:// or https://', 'err'); return; }

    placeholder.classList.add('hidden');
    playBtn.disabled = true;
    playBtn.textContent = '… Loading';
    setStatus('Connecting…', 'loading');
    livePill.classList.remove('show');
    infoRes.textContent = '—';
    infoBitrate.textContent = '—';
    infoDropped.textContent = '—';
    qualitySelect.innerHTML = '<option value="-1">Auto (ABR)</option>';

    if (hls) { hls.destroy(); hls = null; }
    if (droppedTimer) clearInterval(droppedTimer);
    video.src = '';

    if (Hls.isSupported()) {
      hls = new Hls({
        xhrSetup: function(xhr) {
          xhr.setRequestHeader('X-Referer', 'https://www.patreon.com/');
        },
        enableWorker: true,
        lowLatencyMode: true,
        abrEwmaDefaultEstimate: 1000000,
        startLevel: -1,
        capLevelToPlayerSize: true,
        backBufferLength: 90,
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
      });

      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function(e, data) {
        populateQualities(data.levels);
        setStatus('Manifest parsed — ' + data.levels.length + ' level(s) | ABR active', 'ok');
        playBtn.disabled = false;
        playBtn.textContent = '▶ Play';
        livePill.classList.add('show');
        video.play().catch(function(){});
        droppedTimer = setInterval(updateDropped, 2000);
      });

      hls.on(Hls.Events.LEVEL_SWITCHED, function(e, data) {
        var lvl = hls.levels[data.level];
        if (lvl) {
          infoRes.textContent = (lvl.width || '?') + '×' + (lvl.height || '?');
          infoBitrate.textContent = lvl.bitrate ? Math.round(lvl.bitrate / 1000) + ' kbps' : '—';
        }
        if (qualitySelect.value == -1 || qualitySelect.value == '') {
          setStatus('ABR switched to level ' + data.level + (lvl && lvl.height ? ' (' + lvl.height + 'p)' : ''), 'ok');
        }
      });

      hls.on(Hls.Events.ERROR, function(e, data) {
        if (data.fatal) {
          var msg = 'Fatal error: ' + (data.details || data.type);
          if (data.response && data.response.code === 403) {
            msg = '403 Forbidden — make sure the Referer extension is active for mux.com → patreon.com';
          } else if (data.networkDetails && data.networkDetails.status === 0) {
            msg = 'Network error — CORS or Referer issue. Confirm the extension is enabled.';
          }
          setStatus(msg, 'err');
          livePill.classList.remove('show');
          playBtn.disabled = false;
          playBtn.textContent = '▶ Play';
          if (droppedTimer) clearInterval(droppedTimer);
        } else {
          setStatus('Non-fatal: ' + (data.details || data.type) + ' — recovering…', 'loading');
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = url;
      video.addEventListener('loadedmetadata', function onMeta() {
        video.removeEventListener('loadedmetadata', onMeta);
        setStatus('Playing via native HLS (Safari)', 'ok');
        playBtn.disabled = false;
        playBtn.textContent = '▶ Play';
        livePill.classList.add('show');
        video.play().catch(function(){});
        droppedTimer = setInterval(updateDropped, 2000);
      });
      video.addEventListener('error', function() {
        setStatus('Error loading stream — check URL and extension.', 'err');
        playBtn.disabled = false;
        playBtn.textContent = '▶ Play';
      });
    } else {
      setStatus('HLS not supported in this browser.', 'err');
      playBtn.disabled = false;
      playBtn.textContent = '▶ Play';
    }
  }

  document.getElementById('url-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadStream();
  });
</script>
</body>
</html>
