<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HLS Stream Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8ff47;
    --accent2: #b8ff00;
    --text: #f0f0ee;
    --muted: #666660;
    --muted2: #999994;
    --red: #ff4d4d;
    --green: #4dff91;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
    --radius-lg: 12px;
  }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; }
  body {
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(232,255,71,0.06) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .logo-name { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); text-transform: uppercase; }

  .url-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
  .url-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none;
  }
  .btn { background: var(--accent); color: #0a0a0b; font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 10px 20px; border: none; border-radius: var(--radius); cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--accent2); }

  /* Integrated Player Styles */
  .player-shell { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); overflow: hidden; position: relative; }
  .video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
  video { width: 100%; height: 100%; display: block; }

  /* Overlay Controls (YouTube Style) */
  .inner-controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 40px 15px 15px;
    display: flex; justify-content: flex-end; align-items: center; gap: 12px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10;
  }
  .player-shell:hover .inner-controls { opacity: 1; pointer-events: auto; }

  .ctrl-item { display: flex; align-items: center; gap: 6px; }
  .ctrl-select {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; font-family: var(--mono); font-size: 11px; padding: 4px 8px;
    border-radius: 4px; outline: none; cursor: pointer; backdrop-filter: blur(4px);
  }
  .ctrl-select:hover { background: rgba(255,255,255,0.2); }

  .placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 5; }
  .placeholder.hidden { display: none; }

  .status-bar { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: var(--mono); color: var(--muted2); background: var(--surface); }
  .status-pip { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .status-pip.ok { background: var(--green); }
  .status-pip.err { background: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <div class="logo"><div class="logo-icon">▶</div><span class="logo-name">HLS Player</span></div>
    <div style="font-size: 10px; color: var(--muted); font-family: var(--mono);">MIN: 480p</div>
  </header>

  <div class="url-bar">
    <input class="url-input" id="url-input" type="text" placeholder="Paste .m3u8 URL..." />
    <button class="btn" id="play-btn" onclick="loadStream()">▶ Load</button>
  </div>

  <div class="player-shell">
    <div class="video-wrap">
      <video id="video" controls playsinline crossorigin="anonymous"></video>
      
      <div class="inner-controls" id="player-ui">
        <div class="ctrl-item">
          <select class="ctrl-select" id="speed-select" onchange="changeSpeed(this.value)">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2.0x</option>
          </select>
        </div>
        <div class="ctrl-item">
          <select class="ctrl-select" id="quality-select" onchange="changeQuality(this.value)">
            <option value="-1">Auto</option>
          </select>
        </div>
      </div>

      <div class="placeholder" id="placeholder">
        <span style="color: #444; font-family: var(--mono); font-size: 12px;">READY FOR STREAM</span>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-pip" id="status-pip"></div>
      <span id="status-msg">Standing by</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
  var hls = null;
  var video = document.getElementById('video');

  function setStatus(msg, type) {
    document.getElementById('status-msg').textContent = msg;
    document.getElementById('status-pip').className = 'status-pip' + (type ? ' ' + type : '');
  }

  function changeQuality(val) {
    if (hls) hls.currentLevel = parseInt(val);
  }

  function changeSpeed(val) {
    video.playbackRate = parseFloat(val);
  }

  function loadStream() {
    var url = document.getElementById('url-input').value.trim();
    if (!url) return;

    document.getElementById('placeholder').classList.add('hidden');
    setStatus('Loading...', 'loading');

    if (hls) hls.destroy();

    if (Hls.isSupported()) {
      hls = new Hls({
        enableWorker: true,
        // Ensure we don't start too low
        startLevel: -1 
      });

      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
        // FILTER: Keep only 480p and above
        var filteredLevels = data.levels.map((level, index) => ({ level, index }))
                             .filter(item => item.level.height >= 480);

        // If we have high quality options, restrict HLS to them
        if (filteredLevels.length > 0) {
            // Update the selector UI with only 480p+
            var sel = document.getElementById('quality-select');
            sel.innerHTML = '<option value="-1">Auto (480p+)</option>';
            
            filteredLevels.forEach(item => {
                var opt = document.createElement('option');
                opt.value = item.index;
                opt.textContent = item.level.height + 'p';
                sel.appendChild(opt);
            });

            // Function to prevent dropping below the first available filtered level
            const minLevelIndex = filteredLevels[0].index;
            hls.on(Hls.Events.LEVEL_SWITCHING, (e, data) => {
                if (data.level !== -1 && data.level < minLevelIndex) {
                    hls.currentLevel = minLevelIndex;
                }
            });
            
            setStatus('Stream Optimized (Min 480p)', 'ok');
        } else {
            // Fallback if no 480p exists
            setStatus('Warning: No 480p+ levels found', 'err');
        }
        
        video.play();
      });

      hls.on(Hls.Events.ERROR, function(e, data) {
        if (data.fatal) setStatus('Error: ' + data.details, 'err');
      });
    }
  }
</script>
</body>
</html>
